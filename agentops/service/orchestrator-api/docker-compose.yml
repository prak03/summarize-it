services:
  backend:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: orchestrator-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orchestrator-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
